<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="0.34" stop-color="#f5f3ed"/>
      <stop offset="0.72" stop-color="#ece9df"/>
      <stop offset="1" stop-color="#dfdacf"/>
    </linearGradient>
    <radialGradient id="light" cx="16%" cy="10%" r="88%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.74"/>
      <stop offset="0.48" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#bfb8aa" stop-opacity="0.18"/>
    </radialGradient>
    <filter id="plaster" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.010 0.018" numOctaves="5" seed="21" result="n1"/>
      <feColorMatrix in="n1" type="matrix" values="0.18 0 0 0 0.46  0 0.18 0 0 0.46  0 0 0.18 0 0.46  0 0 0 0.42 0" result="grain"/>
      <feGaussianBlur in="grain" stdDeviation="0.55" result="softGrain"/>
      <feBlend in="SourceGraphic" in2="softGrain" mode="multiply" result="mixed"/>
      <feTurbulence type="fractalNoise" baseFrequency="0.028 0.038" numOctaves="3" seed="9" result="n2"/>
      <feDisplacementMap in="mixed" in2="n2" scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="raised" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.042" numOctaves="4" seed="18" result="bump"/>
      <feDiffuseLighting in="bump" surfaceScale="2.4" lighting-color="#ffffff" result="lit">
        <feDistantLight azimuth="315" elevation="48"/>
      </feDiffuseLighting>
      <feColorMatrix in="lit" type="matrix" values="0.28 0 0 0 0.66  0 0.28 0 0 0.66  0 0 0.28 0 0.66  0 0 0 0.28 0"/>
    </filter>
    <filter id="hairline" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.55"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#light)"/>
  <g filter="url(#plaster)" opacity="0.9">
    <rect width="1920" height="1080" fill="url(#base)"/>
    <rect width="1920" height="1080" fill="url(#light)"/>
  </g>
  <rect width="1920" height="1080" filter="url(#raised)" opacity="0.32"/>
